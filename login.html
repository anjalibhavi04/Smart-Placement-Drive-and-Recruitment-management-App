<!-- {% load static %} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – Placement Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter';
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* 🌈 LIGHT + COLORFUL BACKGROUND */
    background:linear-gradient(135deg,#f8fafc,#e0e7ff,#f1f5f9);
}

/* GLASS CARD */
.container{
    width:380px;
    padding:30px;
    border-radius:20px;

    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(15px);

    color:#1e293b;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
    margin-bottom:5px;
    color:#2563eb;
}

p{
    font-size:14px;
    color:#64748b;
    margin-bottom:20px;
}

/* TOGGLE */
.toggle{
    display:flex;
    background:#e2e8f0;
    border-radius:10px;
    margin-bottom:20px;
}

.toggle button{
    flex:1;
    padding:10px;
    border:none;
    background:none;
    color:#475569;
    cursor:pointer;
    border-radius:10px;
}

.toggle .active{
    background:#2563eb;
    color:white;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #cbd5e1;
    background:white;
    color:#1e293b;
    outline:none;
}

/* BUTTON */
button.main{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;

    background:linear-gradient(135deg,#3b82f6,#6366f1);
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button.main:hover{
    transform:scale(1.03);
}

/* LINK */
a{
    display:block;
    margin-top:15px;
    color:#4f46e5;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
<h2>🎓 Placement Portal</h2>
<p>Welcome back! Please sign in</p>

<div class="toggle">
    <button id="studentBtn" class="active" onclick="setRole('student')">Student</button>
    <button id="adminBtn" onclick="setRole('admin')">Admin</button>
</div>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="main" onclick="login()">Sign In</button>

<a href="{% url 'signup' %}">Don't have an account? Sign Up</a>
</div>

<script>
let role = "student";

function setRole(r){
    role = r;

    document.getElementById("studentBtn").classList.remove("active");
    document.getElementById("adminBtn").classList.remove("active");

    if(r==="student"){
        document.getElementById("studentBtn").classList.add("active");
    }else{
        document.getElementById("adminBtn").classList.add("active");
    }
}

async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/api/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password,role})
    });

    const data = await res.json();

    if(data.success){

        localStorage.setItem("user_id", data.user_id);
        localStorage.setItem("user_name", data.name);
        localStorage.setItem("user_email", data.email);
        localStorage.setItem("user_role", data.role);

        if(data.role === "student"){
            window.location.href = "/student-dashboard/";
        }else{
            window.location.href = "/admin-dashboard/";
        }

    }else{
        alert(data.message);
    }
}
</script>

</body>
</html>
