{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup – Placement Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* 🌈 LIGHT COLORFUL BACKGROUND (same as student dashboard) */
    background:linear-gradient(135deg,#f8fafc,#e0e7ff,#f1f5f9);
}

/* GLASS CARD (light version) */
.container{
    width:330px;
    padding:30px 25px;
    border-radius:15px;

    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(15px);

    color:#1e293b;
    text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.08);
}

h2{
    margin-bottom:6px;
    font-size:28px;
    font-weight:700;
    color:#2563eb;
}

p{
    font-size:14px;
    color:#64748b;
    margin-bottom:20px;
}

/* TOGGLE */
.toggle{
    display:flex;
    background:#e2e8f0;
    border-radius:10px;
    margin-bottom:18px;
}

.toggle button{
    flex:1;
    padding:9px 10px;
    border:none;
    background:none;
    color:#475569;
    cursor:pointer;
    font-size:12px;
    font-weight:500;
}

.toggle .active{
    background:#2563eb;
    color:white;
    border-radius:10px;
}

/* INPUT */
input, select{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #cbd5e1;
    background:white;
    color:#1e293b;
    font-size:12px;
    outline:none;
}

input::placeholder{
    color:#94a3b8;
}

select option{
    color:black;
}

/* BUTTON */
button.main{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;

    background:linear-gradient(135deg,#3b82f6,#6366f1);
    color:white;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    transition:0.3s;
}

button.main:hover{
    transform:scale(1.02);
}

/* LINK */
a{
    display:block;
    margin-top:12px;
    color:#4f46e5;
    text-decoration:none;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">
<h2>🎓 Placement Portal</h2>
<p>Create your account and start your placement journey</p>

<!-- ROLE -->
<div class="toggle">
    <button id="studentBtn" class="active" onclick="setRole('student')">Student</button>
    <button id="adminBtn" onclick="setRole('admin')">Admin</button>
</div>

<!-- FORM -->
<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<!-- DEGREE -->
<select id="degree">
    <option value="">Select Degree</option>
    <option value="BTech">BTech</option>
    <option value="BE">BE</option>
    <option value="BSc">BSc</option>
    <option value="BCA">BCA</option>
    <option value="MTech">MTech</option>
    <option value="MSc">MSc</option>
    <option value="MCA">MCA</option>
    <option value="Diploma">Diploma</option>
    <option value="Other">Other</option>
</select>

<!-- CGPA -->
<input id="cgpa" type="number" step="0.01" placeholder="CGPA">

<!-- SKILLS -->
<input id="skills" placeholder="Skills (e.g. Python, Java)">

<button class="main" onclick="signup()">Create Account</button>

<a href="{% url 'login' %}">Already have an account? Sign In</a>
</div>

<script>
let role="student";

function setRole(r){
    role=r;
    document.getElementById("studentBtn").classList.toggle("active", r==="student");
    document.getElementById("adminBtn").classList.toggle("active", r==="admin");
}

async function signup(){
    const name=document.getElementById("name").value.trim();
    const email=document.getElementById("email").value.trim();
    const password=document.getElementById("password").value.trim();
    const degree=document.getElementById("degree").value;
    const cgpa=document.getElementById("cgpa").value;
    const skills=document.getElementById("skills").value.trim();

    if(!name || !email || !password){
        alert("Please fill required fields");
        return;
    }

    try{
        const res=await fetch("/api/signup",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                name,email,password,role,
                degree,cgpa,skills
            })
        });

        const data=await res.json();

        if(res.ok){
            alert("Signup successful");
            window.location.href="{% url 'login' %}";
        }else{
            alert(data.error || "Signup failed");
        }

    }catch{
        alert("Server error");
    }
}
</script>

</body>
</html>
